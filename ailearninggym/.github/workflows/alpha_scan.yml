name: Alpha Stock Scanner — Daily Run

on:
  schedule:
    # Runs at 11:00 UTC = 7:00 AM ET (before market open)
    - cron: '0 11 * * 1-5'   # Monday–Friday only

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas openpyxl requests pycryptodome --quiet

      - name: Run Alpha Scanner
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          cd alpha-scanner
          python alpha_scanner.py
        # Note: alpha_scanner.py must be copied into the alpha-scanner/ folder

      - name: Encrypt results for dashboard
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          cd alpha-scanner
          python encrypt_results.py

      - name: Inject password hash into dashboard
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          HASH=$(python3 -c "import hashlib, os; print(hashlib.sha256(os.environ['DASHBOARD_PASSWORD'].encode()).hexdigest())")
          sed -i "s/%%PASSWORD_HASH%%/$HASH/g" alpha-scanner/index.html

      - name: Commit encrypted results
        run: |
          git config user.name  "Alpha Scanner Bot"
          git config user.email "bot@ailearninggym.com"
          git add alpha-scanner/results.enc alpha-scanner/index.html
          git diff --staged --quiet || git commit -m "📈 Alpha scan update — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
