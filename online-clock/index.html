<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online World Clock &amp; Timers | AI Learning Gym</title>
    <meta name="description" content="Access high-precision real-time world timezone mapping engines paired with integrated web alarms, stopwatch split laps, and countdown intervals natively inside your browser.">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2027849186057550" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }
        
        /* Slate Theme Profile Baseline */
        .theme-slate {
            --bg-dark: #0f1423;
            --card-bg: #1d263b;
            --accent-blue: #32b5f5;
            --text-light: #ffffff;
            --text-muted: #748ba7;
            --border-color: #2b3852;
        }

        .theme-dark {
            --bg-dark: #090d16;
            --card-bg: #111827;
            --accent-blue: #60a5fa;
            --text-light: #f9fafb;
            --text-muted: #6b7280;
            --border-color: #1f2937;
        }

        .theme-light {
            --bg-dark: #f1f5f9;
            --card-bg: #ffffff;
            --accent-blue: #0284c7;
            --text-light: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.3s;
        }

        .app-container {
            width: 100%;
            max-width: 800px;
        }

        /* --- Top Header & Theme Window --- */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header-bar h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .theme-select {
            background-color: var(--card-bg);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            font-size: 0.9rem;
        }

        /* --- Main Digital Display Canvas --- */
        .main-display-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .time-digits {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-variant-numeric: tabular-nums;
        }

        .date-string {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* --- Tab Control Grid --- */
        .tabs-nav {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background-color: var(--card-bg);
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 12px 5px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: var(--text-light);
        }

        .tab-btn.active {
            background-color: var(--accent-blue);
            color: #ffffff;
        }

        /* --- Content Panels Matrix --- */
        .panel-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid var(--border-color);
            min-height: 250px;
            display: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .panel-card.active {
            display: block;
        }

        .panel-card h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        /* --- Layout Interface Controls --- */
        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .time-select, .time-input {
            background-color: var(--bg-dark);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 1.2rem;
            text-align: center;
            width: 75px;
            outline: none;
        }
        
        .time-select-ampm {
            width: 90px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary { background-color: var(--accent-blue); color: #ffffff; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background-color: #64748b; color: #ffffff; }
        .btn-secondary:hover { background-color: #475569; }
        .btn-danger { background-color: #ef4444; color: #ffffff; }

        /* --- Dynamic Inner Panels --- */
        .timer-display, .stopwatch-display {
            font-size: 3.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
        }

        .lap-box {
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 5px;
            color: var(--text-muted);
            font-size: 0.95rem;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
        }

        /* --- World Grid Selector Framework --- */
        .world-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        @media(min-width: 576px) { .world-grid { grid-template-columns: repeat(2, 1fr); } }

        .world-item {
            background-color: var(--bg-dark);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        
        .zone-selector {
            background-color: transparent;
            border: none;
            color: var(--text-light);
            font-weight: 600;
            padding: 4px 0;
            cursor: pointer;
            font-size: 1rem;
            outline: none;
            max-width: 60%;
        }
        
        .zone-selector option {
            background-color: var(--card-bg);
            color: var(--text-light);
        }

        .world-time { 
            font-variant-numeric: tabular-nums; 
            color: var(--accent-blue); 
            font-weight: 700; 
            font-size: 1.1rem;
        }

        .status-alert {
            text-align: center;
            margin-top: 15px;
            font-weight: 600;
            color: var(--accent-blue);
            font-size: 0.95rem;
        }
    </style>
</head>
<body class="theme-slate">

    <div class="app-container">
        <div class="header-bar">
            <h1>AI Learning Gym Time Studio</h1>
            <select id="themeSelector" class="theme-select">
                <option value="theme-slate">Dark Slate</option>
                <option value="theme-dark">Deep Midnight</option>
                <option value="theme-light">Crisp Light</option>
            </select>
        </div>

        <div class="main-display-card">
            <div id="masterTime" class="time-digits">00:00:00 AM</div>
            <div id="masterDate" class="date-string">Loading Real-Time Matrix...</div>
        </div>

        <div class="tabs-nav">
            <button class="tab-btn active" data-target="panel-alarm">⏰ Alarm</button>
            <button class="tab-btn" data-target="panel-timer">⏳ Timer</button>
            <button class="tab-btn" data-target="panel-stopwatch">⏱️ Stopwatch</button>
            <button class="tab-btn" data-target="panel-world">🌐 World Clock</button>
        </div>

        <div id="panel-alarm" class="panel-card active">
            <h2>Set Web Alarm</h2>
            <div class="input-group">
                <select id="alarmHour" class="time-select">
                    <option value="12">12</option><option value="01">01</option><option value="02">02</option>
                    <option value="03">03</option><option value="04">04</option><option value="05">05</option>
                    <option value="06">06</option><option value="07">07</option><option value="08">08</option>
                    <option value="09">09</option><option value="10">10</option><option value="11">11</option>
                </select>
                <span style="font-size: 1.5rem; font-weight: bold;">:</span>
                <select id="alarmMinute" class="time-select">
                    <option value="00">00</option><option value="05">05</option><option value="10">10</option>
                    <option value="15">15</option><option value="20">20</option><option value="25">25</option>
                    <option value="30">30</option><option value="35">35</option><option value="40">40</option>
                    <option value="45">45</option><option value="50">50</option><option value="55">55</option>
                </select>
                <select id="alarmAmpm" class="time-select time-select-ampm">
                    <option value="AM">AM</option>
                    <option value="PM">PM</option>
                </select>
            </div>
            <div class="controls-row">
                <button id="btnSetAlarm" class="btn btn-primary">Set Alarm</button>
                <button id="btnClearAlarm" class="btn btn-secondary">Clear</button>
            </div>
            <div id="alarmStatus" class="status-alert"></div>
        </div>

        <div id="panel-timer" class="panel-card">
            <h2>Countdown Interval Timer</h2>
            <div id="timerInputArea" class="input-group">
                <input type="number" id="timerMin" class="time-input" min="0" max="59" value="0" placeholder="MM">
                <span style="font-size: 1.5rem; font-weight: bold;">:</span>
                <input type="number" id="timerSec" class="time-input" min="0" max="59" value="30" placeholder="SS">
            </div>
            <div id="timerDisplay" class="timer-display" style="display: none;">00:30</div>
            <div class="controls-row">
                <button id="btnStartTimer" class="btn btn-primary">Start Timer</button>
                <button id="btnResetTimer" class="btn btn-secondary">Reset</button>
            </div>
        </div>

        <div id="panel-stopwatch" class="panel-card">
            <h2>Precision Split Stopwatch</h2>
            <div id="stopwatchDisplay" class="stopwatch-display">00:00.00</div>
            <div class="controls-row">
                <button id="btnStartStopwatch" class="btn btn-primary">Start</button>
                <button id="btnLapStopwatch" class="btn btn-secondary" disabled>Lap</button>
                <button id="btnResetStopwatch" class="btn btn-danger">Reset</button>
            </div>
            <div id="lapBox" class="lap-box"></div>
        </div>

        <div id="panel-world" class="panel-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2>Global Timezone Monitors</h2>
                <span style="font-size: 0.8rem; color: var(--text-muted);">Change slots to track custom cities</span>
            </div>
            <div class="world-grid">
                <div class="world-item">
                    <select class="zone-selector" data-slot="1">
                        <option value="Europe/London" selected>London (GMT)</option>
                        <option value="America/New_York">New York (EST)</option>
                        <option value="America/Chicago">Chicago (CST)</option>
                        <option value="America/Los_Angeles">Los Angeles (PST)</option>
                        <option value="Asia/Tokyo">Tokyo (JST)</option>
                        <option value="Asia/Dubai">Dubai (GST)</option>
                        <option value="Australia/Sydney">Sydney (AEST)</option>
                        <option value="Europe/Paris">Paris (CET)</option>
                        <option value="Asia/Kolkata">Mumbai (IST)</option>
                        <option value="Asia/Singapore">Singapore (SGT)</option>
                    </select>
                    <span class="world-time" id="world-clock-1">00:00:00</span>
                </div>
                <div class="world-item">
                    <select class="zone-selector" data-slot="2">
                        <option value="Europe/London">London (GMT)</option>
                        <option value="America/New_York" selected>New York (EST)</option>
                        <option value="America/Chicago">Chicago (CST)</option>
                        <option value="America/Los_Angeles">Los Angeles (PST)</option>
                        <option value="Asia/Tokyo">Tokyo (JST)</option>
                        <option value="Asia/Dubai">Dubai (GST)</option>
                        <option value="Australia/Sydney">Sydney (AEST)</option>
                        <option value="Europe/Paris">Paris (CET)</option>
                        <option value="Asia/Kolkata">Mumbai (IST)</option>
                        <option value="Asia/Singapore">Singapore (SGT)</option>
                    </select>
                    <span class="world-time" id="world-clock-2">00:00:00</span>
                </div>
                <div class="world-item">
                    <select class="zone-selector" data-slot="3">
                        <option value="Europe/London">London (GMT)</option>
                        <option value="America/New_York">New York (EST)</option>
                        <option value="America/Chicago">Chicago (CST)</option>
                        <option value="America/Los_Angeles">Los Angeles (PST)</option>
                        <option value="Asia/Tokyo" selected>Tokyo (JST)</option>
                        <option value="Asia/Dubai">Dubai (GST)</option>
                        <option value="Australia/Sydney">Sydney (AEST)</option>
                        <option value="Europe/Paris">Paris (CET)</option>
                        <option value="Asia/Kolkata">Mumbai (IST)</option>
                        <option value="Asia/Singapore">Singapore (SGT)</option>
                    </select>
                    <span class="world-time" id="world-clock-3">00:00:00</span>
                </div>
                <div class="world-item">
                    <select class="zone-selector" data-slot="4">
                        <option value="Europe/London">London (GMT)</option>
                        <option value="America/New_York">New York (EST)</option>
                        <option value="America/Chicago">Chicago (CST)</option>
                        <option value="America/Los_Angeles">Los Angeles (PST)</option>
                        <option value="Asia/Tokyo">Tokyo (JST)</option>
                        <option value="Asia/Dubai">Dubai (GST)</option>
                        <option value="Australia/Sydney" selected>Sydney (AEST)</option>
                        <option value="Europe/Paris">Paris (CET)</option>
                        <option value="Asia/Kolkata">Mumbai (IST)</option>
                        <option value="Asia/Singapore">Singapore (SGT)</option>
                    </select>
                    <span class="world-time" id="world-clock-4">00:00:00</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Tab Control Navigation State Engine ---
        const tabs = document.querySelectorAll('.tab-btn');
        const panels = document.querySelectorAll('.panel-card');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                panels.forEach(p => p.classList.remove('active'));

                tab.classList.add('active');
                document.getElementById(tab.dataset.target).classList.add('active');
            });
        });

        // --- Global Dashboard Theme Switching Logic ---
        document.getElementById('themeSelector').addEventListener('change', (e) => {
            document.body.className = e.target.value;
        });

        // --- Audio Synthesizer Engine (Self-Generating Sine Fallback) ---
        function triggerBeepAlert() {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                const gain = context.createGain();
                osc.connect(gain);
                gain.connect(context.destination);
                osc.type = 'sine';
                osc.frequency.value = 880; // Secure pitch notification frequency
                gain.gain.setValueAtTime(1, context.currentTime);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.001, context.currentTime + 1.5);
                osc.stop(context.currentTime + 1.5);
            } catch (e) {
                console.log("Audio pipeline initializing requires user interaction focus first.");
            }
        }

        // --- Core Clock Operational Execution Loop ---
        let targetAlarmTime = null;

        function updateMasterClock() {
            const now = new Date();
            
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; 
            const cleanHours = String(hours).padStart(2, '0');

            // Expose primary timeline node
            const timestampString = `${cleanHours}:${minutes}:${seconds} ${ampm}`;
            document.getElementById('masterTime').textContent = timestampString;

            // Render descriptive calendar layout
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('masterDate').textContent = now.toLocaleDateString('en-US', dateOptions);

            // Verify alarm constraints matching profile loops
            if (targetAlarmTime) {
                const currentMinuteCheck = `${cleanHours}:${minutes} ${ampm}`;
                if (currentMinuteCheck === targetAlarmTime) {
                    triggerBeepAlert();
                    alert("⏰ AI Learning Gym Alert! Your scheduled alarm is ringing!");
                    targetAlarmTime = null;
                    document.getElementById('alarmStatus').textContent = "";
                }
            }

            // Parse and sync multi-zone custom selector nodes dynamically
            const zoneSelectors = document.querySelectorAll('.zone-selector');
            zoneSelectors.forEach(selector => {
                const slotId = selector.dataset.slot;
                const selectedTimezone = selector.value;
                try {
                    const localZoneString = new Date().toLocaleTimeString('en-US', {
                        timeZone: selectedTimezone,
                        hour12: false
                    });
                    document.getElementById(`world-clock-${slotId}`).textContent = localZoneString;
                } catch (err) {
                    document.getElementById(`world-clock-${slotId}`).textContent = "00:00:00";
                }
            });
        }
        setInterval(updateMasterClock, 1000);
        updateMasterClock();

        // --- WEBALARM SYSTEM CORES ---
        document.getElementById('btnSetAlarm').addEventListener('click', () => {
            const h = document.getElementById('alarmHour').value;
            const m = document.getElementById('alarmMinute').value;
            const ampm = document.getElementById('alarmAmpm').value;
            targetAlarmTime = `${h}:${m} ${ampm}`;
            document.getElementById('alarmStatus').textContent = `Alarm targeted securely for ${targetAlarmTime}`;
        });

        document.getElementById('btnClearAlarm').addEventListener('click', () => {
            targetAlarmTime = null;
            document.getElementById('alarmStatus').textContent = "Alarm status cleared.";
        });

        // --- TIMER INTERVAL LOGIC SYSTEM ---
        let timerInterval = null;
        let totalTimerSeconds = 0;

        const btnStartTimer = document.getElementById('btnStartTimer');
        const timerDisplay = document.getElementById('timerDisplay');
        const timerInputArea = document.getElementById('timerInputArea');

        btnStartTimer.addEventListener('click', () => {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                btnStartTimer.textContent = "Resume Timer";
            } else {
                if (totalTimerSeconds === 0) {
                    const m = parseInt(document.getElementById('timerMin').value) || 0;
                    const s = parseInt(document.getElementById('timerSec').value) || 0;
                    totalTimerSeconds = (m * 60) + s;
                }

                if (totalTimerSeconds <= 0) return;

                timerInputArea.style.display = 'none';
                timerDisplay.style.display = 'block';
                btnStartTimer.textContent = "Pause";

                timerInterval = setInterval(() => {
                    totalTimerSeconds--;
                    
                    const displayM = String(Math.floor(totalTimerSeconds / 60)).padStart(2, '0');
                    const displayS = String(totalTimerSeconds % 60).padStart(2, '0');
                    timerDisplay.textContent = `${displayM}:${displayS}`;

                    if (totalTimerSeconds <= 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        triggerBeepAlert();
                        alert("⏳ Countdown threshold reached!");
                        resetTimerInterface();
                    }
                }, 1000);
            }
        });

        document.getElementById('btnResetTimer').addEventListener('click', resetTimerInterface);

        function resetTimerInterface() {
            clearInterval(timerInterval);
            timerInterval = null;
            totalTimerSeconds = 0;
            timerInputArea.style.display = 'flex';
            timerDisplay.style.display = 'none';
            btnStartTimer.textContent = "Start Timer";
            document.getElementById('timerMin').value = "0";
            document.getElementById('timerSec').value = "30";
        }

        // --- TRACKING STOPWATCH FRAMEWORKS ---
        let stopwatchInterval = null;
        let stopwatchStartTime = 0;
        let elapsedTime = 0;
        let lapCount = 0;

        const btnStartStopwatch = document.getElementById('btnStartStopwatch');
        const btnLapStopwatch = document.getElementById('btnLapStopwatch');
        const stopwatchDisplay = document.getElementById('stopwatchDisplay');
        const lapBox = document.getElementById('lapBox');

        btnStartStopwatch.addEventListener('click', () => {
            if (stopwatchInterval) {
                clearInterval(stopwatchInterval);
                elapsedTime += Date.now() - stopwatchStartTime;
                stopwatchInterval = null;
                btnStartStopwatch.textContent = "Resume";
                btnLapStopwatch.disabled = true;
            } else {
                stopwatchStartTime = Date.now();
                stopwatchInterval = setInterval(updateStopwatchDisplay, 10);
                btnStartStopwatch.textContent = "Pause";
                btnLapStopwatch.disabled = false;
            }
        });

        btnLapStopwatch.addEventListener('click', () => {
            lapCount++;
            const currentLapTime = stopwatchDisplay.textContent;
            const lapRow = document.createElement('div');
            lapRow.className = 'lap-item';
            lapRow.innerHTML = `<span>Split Designation Lap ${lapCount}</span><strong>${currentLapTime}</strong>`;
            lapBox.prepend(lapRow);
        });

        document.getElementById('btnResetStopwatch').addEventListener('click', () => {
            clearInterval(stopwatchInterval);
            stopwatchInterval = null;
            elapsedTime = 0;
            lapCount = 0;
            stopwatchDisplay.textContent = "00:00.00";
            btnStartStopwatch.textContent = "Start";
            btnLapStopwatch.disabled = true;
            lapBox.innerHTML = "";
        });

        function updateStopwatchDisplay() {
            const totalMs = elapsedTime + (Date.now() - stopwatchStartTime);
            const minutes = String(Math.floor(totalMs / 60000)).padStart(2, '0');
            const seconds = String(Math.floor((totalMs % 60000) / 1000)).padStart(2, '0');
            const centiseconds = String(Math.floor((totalMs % 1000) / 10)).padStart(2, '0');
            
            stopwatchDisplay.textContent = `${minutes}:${seconds}.${centiseconds}`;
        }
    </script>
</body>
</html>
